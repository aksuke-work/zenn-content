name: Auto Publish Article

on:
  # schedule は Zenn AI方針対応のため停止（2026-03-30）
  # 週2-3本を手動公開に切り替え
  workflow_dispatch: # 手動実行のみ

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Find and publish one article
        run: |
          # published: false の記事を古い順に取得
          ARTICLE=$(grep -rl 'published: false' articles/ | head -1)

          if [ -z "$ARTICLE" ]; then
            echo "No unpublished articles found. Skipping."
            exit 0
          fi

          echo "Publishing: $ARTICLE"

          # published: false → true に変更
          sed -i 's/published: false/published: true/' "$ARTICLE"

          # コミット & プッシュ
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$ARTICLE"
          git commit -m "Auto-publish: $(basename $ARTICLE .md)"
          git push
